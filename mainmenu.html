<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TileTether - Main Menu</title>
  <style>
    :root {
      --gold: #ffd700; --gold-dark: #d4af37;
      --brown: #8b4513; --brown-dark: #5c2a0d;
      --green: #4caf50; --green-dark: #2e7d32;
      --blue: #1976d2; --blue-dark: #0d47a1;
      --red: #d32f2f; --red-dark: #b71c1c;
      --text: #fff;
      --shadow: 0 4px 0 rgba(0,0,0,.55), 0 10px 24px rgba(0,0,0,.3);
      --bg-img: url('paths/path_01.png');
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: "Courier New", Courier, monospace;
      color: var(--text); position: relative;
      background: radial-gradient(circle at 20% 15%, rgba(255,255,255,.15) 0 6%, transparent 7%),
                  radial-gradient(circle at 78% 18%, rgba(255,255,255,.1) 0 4%, transparent 5%),
                  linear-gradient(to bottom, var(--blue-dark) 0%, var(--blue) 45%, var(--green) 45.2%, var(--green-dark) 100%);
    }
    body::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.3), rgba(0,0,0,0) 40%), var(--bg-img) center center / cover no-repeat;
      opacity: .2; filter: blur(2px); pointer-events: none; z-index: -1;
    }
    .view-container { position: absolute; inset: 0; display: flex; flex-direction: column; }
    #menuView { padding: 14px 14px calc(14px + env(safe-area-inset-bottom)) 14px; overflow: hidden; }
    .coin-display { display: flex; align-items: center; gap: 8px; min-width: 92px; width: max-content; padding: 8px 12px; background: linear-gradient(180deg, var(--gold), var(--gold-dark)); color: var(--brown-dark); border: 3px solid #fff; outline: 3px solid var(--brown-dark); box-shadow: var(--shadow); font-weight: 900; text-shadow: none; }
    .coin-icon { width: 18px; height: 18px; image-rendering: pixelated; object-fit: contain; filter: drop-shadow(1px 1px 0 rgba(0,0,0,.35)); }
    @keyframes floatLogo { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-4px) rotate(1deg); } }
    .menu-shell { flex: 1; display: flex; align-items: flex-start; justify-content: center; position: relative; z-index: 3; padding: 4vh 0 16px 0; overflow-y: auto; }
    .menu-stack { width: min(100%, 360px); display: flex; flex-direction: column; gap: 8px; }
    .menu-logo { width: 100%; aspect-ratio: 6 / 1; object-fit: contain; align-self: center; margin-bottom: 8px; filter: drop-shadow(3px 3px 0 #000) drop-shadow(0 0 12px rgba(255,215,0,.3)); animation: floatLogo 2.8s ease-in-out infinite; }
    .menu-entry { width: 100%; border: 3px solid var(--gold); outline: 3px solid var(--brown-dark); background: linear-gradient(180deg, var(--brown), var(--brown-dark)); color: #fff; box-shadow: var(--shadow); padding: 8px 12px; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: flex-start; gap: 12px; position: relative; overflow: hidden; }
    .menu-entry::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, rgba(255,255,255,.05) 0 8px, rgba(255,255,255,0) 8px 16px); pointer-events: none; }
    .menu-entry:hover { transform: translateY(-2px); border-color: #fff; }
    .menu-entry:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.5); }
    .menu-entry .left { display: flex; flex-direction: column; gap: 2px; position: relative; z-index: 1; flex: 1; }
    .menu-entry .title { font-size: 13px; line-height: 1; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; text-shadow: 2px 2px 0 #000; }
    .menu-entry .desc { font-size: 9px; color: var(--gold); letter-spacing: .8px; text-transform: uppercase; text-shadow: 1px 1px 0 #000; }
    .menu-entry .right { font-size: 12px; font-weight: 900; color: var(--gold); text-shadow: 2px 2px 0 #000; text-transform: uppercase; position: relative; z-index: 1; flex-shrink: 0; text-align: right; margin-left: auto; }
    .menu-entry.primary { background: linear-gradient(180deg, var(--red), var(--red-dark)); border-color: var(--gold); }
    .menu-entry.primary .desc { color: #fff; }
    .character-dock { position: fixed; right: 14px; bottom: 14px; z-index: 18; width: min(40vw, 150px); min-width: 120px; background: linear-gradient(180deg, var(--brown), var(--brown-dark)); border: 3px solid var(--gold); outline: 3px solid #000; box-shadow: var(--shadow); padding: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; transition: transform 0.2s; }
    .character-dock:active { transform: translateY(2px); }
    .dock-top { display: flex; justify-content: space-between; align-items: center; }
    .dock-title { font-size: 10px; font-weight: 900; color: var(--gold); text-transform: uppercase; text-shadow: 1px 1px 0 #000; }
    .dock-avatar { position: relative; height: 80px; display: flex; align-items: flex-end; justify-content: center; gap: 6px; background-color: rgba(0,0,0,0.6); background-size: cover; background-position: center; border: 2px solid rgba(255,215,0,0.2); overflow: hidden; border-radius: 4px; padding-bottom: 5px; }
    .dock-avatar img { height: 70px; width: auto; object-fit: contain; image-rendering: pixelated; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.6)); }
    .dock-name { text-align: center; font-size: 11px; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 2px 2px 0 #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(3px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 12px; }
    .popup-box { position: relative; width: 100%; max-width: 410px; max-height: 88vh; display: flex; flex-direction: column; gap: 10px; padding: 16px; background: linear-gradient(180deg, var(--brown), var(--brown-dark)); border: 4px solid var(--gold); outline: 4px solid #000; box-shadow: var(--shadow); overflow-y: auto; animation: popOpen 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes popOpen { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .popup-title { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); text-shadow: 2px 2px 0 #000; text-align: center; border-bottom: 2px dashed rgba(255,215,0,.3); padding-bottom: 8px; }
    .btn { position: relative; border: 3px solid var(--gold); outline: 3px solid #000; background: linear-gradient(180deg, var(--blue), var(--blue-dark)); color: #fff; font-family: inherit; font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; padding: 10px 12px; box-shadow: 0 4px 0 rgba(0,0,0,.5); text-shadow: 2px 2px 0 #000; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s, box-shadow 0.1s; }
    .btn:hover { filter: brightness(1.1); border-color: #fff; transform: translateY(-2px); }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.5); }
    .btn-green { background: linear-gradient(180deg, var(--green), var(--green-dark)); }
    .btn-red { background: linear-gradient(180deg, var(--red), var(--red-dark)); }
    .form-group { display: flex; flex-direction: column; gap: 4px; text-align: left; }
    .form-group label { font-size: 11px; font-weight: 900; color: var(--gold); text-shadow: 1px 1px 0 #000; text-transform: uppercase; }
    .form-control { background: #000; border: 2px solid var(--gold); padding: 8px; color: #fff; font-family: inherit; font-size: 13px; outline: none; }
    .form-control:focus { border-color: #fff; }
    .player-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; padding-right: 4px; }
    .player-card { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); border: 2px solid var(--gold); padding: 8px; }
    .player-info { display: flex; flex-direction: column; gap: 2px; }
    .player-name { font-weight: 900; font-size: 12px; color: #fff; }
    .player-stats { font-size: 9px; color: var(--gold); }
    .status-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 1px solid #000; }
    .status-online { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-offline { background: #777; }
    .roller-stage { position: relative; width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; perspective: 900px; margin: 4px 0; cursor: grab; touch-action: pan-y; }
    .roller-card { position: absolute; width: 90px; height: 100px; padding: 6px; background: linear-gradient(180deg, #d2b48c, #8b4513); border: 3px solid #000; outline: 2px solid rgba(255,255,255,.2); box-shadow: 0 5px 0 rgba(0,0,0,.5); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: transform .25s ease, opacity .25s ease, filter .2s ease; overflow: hidden; }
    .roller-card img { width: 45px; height: 45px; object-fit: contain; image-rendering: pixelated; pointer-events: none; filter: drop-shadow(2px 3px 0 rgba(0,0,0,.4)); }
    .roller-card .item-name { width: 100%; font-size: 9px; font-weight: 900; color: #fff; text-shadow: 1px 1px 0 #000; text-transform: uppercase; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shop-section { border: 3px solid var(--gold); padding: 10px; background: rgba(0,0,0,.3); margin-bottom: 8px; }
    .shop-section-title { font-weight: 900; font-size: 12px; color: #fff; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 2px solid var(--gold); text-transform: uppercase; letter-spacing: 1px; text-shadow: 2px 2px 0 #000; text-align: center; background: var(--brown-dark); }
    .shop-item-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; border-bottom: 1px dashed rgba(255,215,0,.3); padding: 8px 0; }
    .shop-item-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .shop-item-icon { width: 36px; height: 36px; background: rgba(0,0,0,.5); border: 2px solid var(--gold); image-rendering: pixelated; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .shop-item-icon img { width: 85%; height: 85%; object-fit: contain; }
    .shop-btn { padding: 6px 8px; font-size: 10px; flex-shrink: 0; }
    .btn-inline { width: 100%; }
    .modal-stack { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow: auto; padding-right: 4px; margin-bottom: 8px; }
    #msgModalText { font-size: 13px; line-height: 1.4; color: #fff; font-weight: 900; text-align: center; text-shadow: 2px 2px 0 #000; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; border: 1px solid #000; }
  </style>
</head>
<body>
  <audio id="bgmMenu" src="audio/bgm_menu.mp3" loop></audio>
  <audio id="sfxClick" src="audio/click.mp3"></audio>

  <div id="menuView" class="view-container">
    <main class="menu-shell">
      <section class="menu-stack">
        <img src="logo.png" alt="TileTether" class="menu-logo" onerror="this.style.display='none'">
        <div id="mainMenuBox">
          <button class="menu-entry primary" onclick="startSinglePlayerGame()">
            <div class="left"><div class="title">VS AI (Farming)</div><div class="desc">Latihan & Kumpulkan Koin</div></div>
            <div class="right">🤖</div>
          </button>
          <button class="menu-entry" onclick="openPlayersModal()">
            <div class="left"><div class="title">VS Player (Online)</div><div class="desc">Tantang Pemain Lain</div></div>
            <div class="right">⚔️</div>
          </button>
          <button class="menu-entry" onclick="openPathModal()">
            <div class="left"><div class="title">Arena</div><div class="desc">Pilih peta pertarungan</div></div>
            <div class="right" id="dashPathText">DEFAULT</div>
          </button>
          <button class="menu-entry" onclick="openShop()">
            <div class="left"><div class="title">Toko</div><div class="desc">Beli item bantuan</div></div>
            <div class="right">🛒</div>
          </button>
          <button class="menu-entry" onclick="launchCommunity()">
            <div class="left"><div class="title">Komunitas</div><div class="desc">Hubungi Dev & User Lain</div></div>
            <div class="right">💬</div>
          </button>
          <button class="menu-entry" id="authBtn" onclick="openAuthModal('login')">
            <div class="left"><div class="title" id="authBtnTitle">LOGIN / DAFTAR</div><div class="desc" id="authBtnDesc">Simpan Data Ke Cloud</div></div>
            <div class="right">🔑</div>
          </button>
          <button class="menu-entry" id="profBtn" style="display:none;" onclick="openProfileModal()">
            <div class="left"><div class="title">Profil Saya</div><div class="desc">Lihat & Edit Profil</div></div>
            <div class="right">👤</div>
          </button>
        </div>
      </section>
    </main>

    <aside class="character-dock" onclick="openCharModal()">
      <div class="dock-top"><div class="dock-title">Pemain</div></div>
      <div class="dock-avatar" id="dockAvatar">
        <img src="characters/bob/idle_1.png" id="mainCharImg" onerror="this.style.display='none'">
      </div>
      <div class="dock-name" id="dockCharName">GUEST</div>
    </aside>

    <!-- Modals -->
    <div class="popup-overlay" id="authModal">
      <div class="popup-box">
        <div class="popup-title" id="authTitle">LOGIN</div>
        <form id="authForm" onsubmit="handleAuthSubmit(event)">
          <div class="form-group" id="usernameGroup" style="display:none;">
            <label>Username</label>
            <input type="text" id="authUsername" class="form-control" placeholder="Masukkan username unik">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="authEmail" class="form-control" required placeholder="nama@email.com">
          </div>
          <div class="form-group" id="ageGroup" style="display:none;">
            <label>Umur (10 - 79 tahun)</label>
            <input type="number" id="authAge" class="form-control" min="10" max="79" placeholder="Minimal 10 tahun">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="authPassword" class="form-control" required placeholder="******">
          </div>
          <button type="submit" class="btn btn-green btn-inline" style="margin-top: 10px;" id="authSubmitBtn">MASUK</button>
        </form>
        <div style="text-align:center; margin-top:8px;">
          <a href="#" id="toggleAuthModeBtn" onclick="toggleAuthMode(); return false;" style="color:var(--gold); font-size:11px;">Belum punya akun? Daftar di sini</a>
        </div>
        <button class="btn btn-red btn-inline" onclick="closeModal('authModal')">BATAL</button>
      </div>
    </div>

    <div class="popup-overlay" id="profileModal">
      <div class="popup-box">
        <div class="popup-title">PROFIL PEMAIN</div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="profUsername" class="form-control">
        </div>
        <div class="form-group">
          <label>Email (Permanen)</label>
          <input type="text" id="profEmail" class="form-control" disabled style="opacity:0.6;">
        </div>
        <div class="form-group">
          <label>Umur (10-79)</label>
          <input type="number" id="profAge" class="form-control" min="10" max="79">
        </div>
        <div class="shop-section" style="margin-top:6px;">
          <div class="shop-section-title">STATISTIK PERMAINAN</div>
          <div style="font-size:11px; display:flex; flex-direction:column; gap:4px;">
            <div>🪙 Koin: <span id="profCoins" style="color:var(--gold); font-weight:bold;">0</span></div>
            <div>🏆 Menang: <span id="profWins" style="color:var(--green); font-weight:bold;">0</span> Kali</div>
            <div>💀 Kalah: <span id="profLosses" style="color:var(--red); font-weight:bold;">0</span> Kali</div>
            <div>🎒 Total Item Bantuan: <span id="profItems" style="color:#fff; font-weight:bold;">0</span> Item</div>
          </div>
        </div>
        <button class="btn btn-green btn-inline" onclick="saveProfileChanges()">SIMPAN PERUBAHAN</button>
        <button class="btn btn-red btn-inline" onclick="logoutUser()">LOGOUT</button>
        <button class="btn btn-blue btn-inline" onclick="closeModal('profileModal')">TUTUP</button>
      </div>
    </div>

    <div class="popup-overlay" id="playersModal">
      <div class="popup-box">
        <div class="popup-title">DAFTAR PEMAIN ONLINE</div>
        <div class="player-list" id="playersListContainer"></div>
        <button class="btn btn-red btn-inline" onclick="closeModal('playersModal')">TUTUP</button>
      </div>
    </div>

    <div class="popup-overlay" id="challengeModal">
      <div class="popup-box">
        <div class="popup-title">TANTANG PEMAIN</div>
        <div style="text-align:center; font-size:12px;" id="challengeTargetText">Tantang User</div>
        <div class="form-group">
          <label>Jumlah Taruhan Koin (Min 100)</label>
          <input type="number" id="challengeBetAmount" class="form-control" value="100" min="100">
        </div>
        <button class="btn btn-green btn-inline" onclick="sendChallenge()">KIRIM TANTANGAN</button>
        <button class="btn btn-red btn-inline" onclick="closeModal('challengeModal')">BATAL</button>
      </div>
    </div>

    <div class="popup-overlay" id="incomingChallengeModal">
      <div class="popup-box">
        <div class="popup-title">TANTANGAN MASUK!</div>
        <p id="incomingChallengeText" style="text-align:center; font-size:12px;"></p>
        <div style="display:flex; gap:10px; margin-top: 10px;">
          <button class="btn btn-green btn-inline" onclick="respondChallenge(true)">TERIMA</button>
          <button class="btn btn-red btn-inline" onclick="respondChallenge(false)">TOLAK</button>
        </div>
      </div>
    </div>

    <div class="popup-overlay" id="pathModal">
      <div class="popup-box">
        <div class="popup-title">Pilih Arena</div>
        <div class="roller-stage" id="pathRollerStage"></div>
        <div style="margin-top: 5px; text-align:center;">
          <span id="pathRollerLabel" style="font-weight: 900; font-size: 15px; color: var(--gold); text-shadow: 2px 2px 0 #000;">DEFAULT</span>
        </div>
        <button class="btn btn-green btn-inline" style="margin-top: 10px;" onclick="closeModal('pathModal')">Pilih</button>
      </div>
    </div>

    <div class="popup-overlay" id="charModal">
      <div class="popup-box">
        <div class="popup-title">Pilih Karakter</div>
        <div class="roller-stage" id="charRollerStage"></div>
        <div style="margin-top: 5px; text-align:center;">
          <span id="charRollerLabel" style="font-weight: 900; font-size: 15px; color: var(--gold); text-shadow: 2px 2px 0 #000;">BOB</span>
        </div>
        <button class="btn btn-green btn-inline" style="margin-top: 10px;" onclick="closeModal('charModal')">Pilih</button>
      </div>
    </div>

    <div class="popup-overlay" id="shopModal">
      <div class="popup-box">
        <div class="popup-title">Toko</div>
        <div class="coin-display" id="shopCoinDisplay" style="margin: 0 auto 10px auto; justify-content:center;">COINS: 0</div>
        <div id="shopContent" class="modal-stack"></div>
        <button class="btn btn-red btn-inline" onclick="closeShop()">Tutup</button>
      </div>
    </div>

    <div class="popup-overlay" id="messageModal">
      <div class="popup-box">
        <div class="popup-title" id="msgModalTitle">Info</div>
        <p id="msgModalText"></p>
        <div id="msgModalButtons" style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
          <button class="btn btn-blue btn-inline" onclick="closeModal('messageModal')">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyB-lRvFDWFceXE1lloWeAP732uohRe7iLo",
      authDomain: "ambademo.firebaseapp.com",
      projectId: "ambademo",
      storageBucket: "ambademo.firebasestorage.app",
      messagingSenderId: "346919760984",
      appId: "1:346919760984:web:c9b102656aa020f3f2062d"
    };
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
      const { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
      const { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, getDocs, query, where, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      window.fbAuth = auth; window.fbDb = db; window.fbUpdateDoc = updateDoc; window.fbDoc = doc; window.fbDeleteDoc = deleteDoc; window.isFirebaseReady = true;

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          window.currentUser = user;
          try {
            await updateDoc(doc(db, "users", user.uid), { isOnline: true });
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
              if (docSnap.exists()) { window.userData = docSnap.data(); window.syncUserDataToLocal(); }
            });
            listenForChallenges(user.uid);
          } catch(e) { console.warn("Firestore error:", e); }
          document.getElementById('authBtn').style.display = 'none';
          document.getElementById('profBtn').style.display = 'flex';
          document.getElementById('dockCharName').innerText = (window.userData && window.userData.username) ? window.userData.username.toUpperCase() : "PLAYER";
        } else {
          window.currentUser = null;
          document.getElementById('authBtn').style.display = 'flex';
          document.getElementById('profBtn').style.display = 'none';
          document.getElementById('dockCharName').innerText = "GUEST";
        }
      });
      
      window.registerUserFB = async (email, password, username, age) => {
        const res = await createUserWithEmailAndPassword(auth, email, password);
        const initialData = { uid: res.user.uid, username: username, email: email, age: parseInt(age), coins: window.userData.coins || 1000, wins: window.userData.wins || 0, losses: window.userData.losses || 0, items: window.userData.items || { antidead: 0, stalestill: 0, glidesteps: 0 }, isOnline: true, selectedChar: menuState.p1Char, selectedPath: menuState.pathTheme };
        await setDoc(doc(db, "users", res.user.uid), initialData);
        window.userData = initialData; window.syncUserDataToLocal();
      };
      
      window.loginUserFB = async (email, password) => { await signInWithEmailAndPassword(auth, email, password); };
      
      window.logoutUserFB = async () => {
        if(window.currentUser) { try { await updateDoc(doc(db, "users", window.currentUser.uid), { isOnline: false }); } catch(e){} }
        await signOut(auth);
      };
      
      window.saveUserDataToCloud = async () => {
        if (!window.currentUser || !window.userData || !window.isFirebaseReady) return;
        try {
          await updateDoc(doc(db, "users", window.currentUser.uid), { coins: window.userData.coins || 0, wins: window.userData.wins || 0, losses: window.userData.losses || 0, items: window.userData.items || { antidead: 0, stalestill: 0, glidesteps: 0 }, username: window.userData.username, age: window.userData.age, selectedChar: menuState.p1Char, selectedPath: menuState.pathTheme });
        } catch(e) { console.warn("Cloud save error:", e); }
      };

      window.loadAllPlayersCloud = async () => {
        if(!window.isFirebaseReady) return [];
        const q = query(collection(db, "users"), where("isOnline", "==", true));
        const querySnapshot = await getDocs(q); let players = [];
        querySnapshot.forEach((docSnap) => { if(!window.currentUser || docSnap.id !== window.currentUser.uid) players.push(docSnap.data()); });
        return players;
      };

      let matchUnsubscribe = null;
      function listenForChallenges(uid) {
        if (matchUnsubscribe) matchUnsubscribe();
        const q = query(collection(db, "matches"), where("targetUid", "==", uid), where("status", "==", "pending"));
        matchUnsubscribe = onSnapshot(q, (snapshot) => {
          snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
              const matchData = change.doc.data();
              window.activeChallengeDocId = change.doc.id; window.activeChallengeData = matchData;
              document.getElementById('incomingChallengeText').innerText = `${matchData.challengerName} menantang Anda bertarung dengan taruhan ${matchData.betCoin} Koin!`;
              openModal('incomingChallengeModal');
            }
          });
        });
      }

      window.createChallengeCloud = async (targetUid, targetName, targetChar, betCoin) => {
        const matchRef = doc(collection(db, "matches"));
        const matchData = { matchId: matchRef.id, challengerUid: window.currentUser.uid, challengerName: window.userData.username, challengerChar: window.userData.selectedChar || menuState.p1Char, targetUid: targetUid, targetName: targetName, targetChar: targetChar, betCoin: parseInt(betCoin), status: "pending", gameState: null, currentTurnUid: window.currentUser.uid };
        await setDoc(matchRef, matchData); return matchRef.id;
      };

      window.respondChallengeCloud = async (matchId, accept) => {
        const matchRef = doc(db, "matches", matchId);
        await updateDoc(matchRef, { status: accept ? "active" : "rejected" });
      };

      window.listenOnlineMatchState = (matchId, onUpdate) => {
        return onSnapshot(doc(db, "matches", matchId), (docSnap) => { if (docSnap.exists()) onUpdate(docSnap.data()); });
      };

      document.addEventListener('visibilitychange', () => {
        if (window.currentUser && window.isFirebaseReady) {
          try { window.fbUpdateDoc(window.fbDoc(window.fbDb, "users", window.currentUser.uid), { isOnline: document.visibilityState === 'visible' }); } catch(e){}
        }
      });
      window.addEventListener('beforeunload', () => {
        if(window.currentUser && window.isFirebaseReady) {
          try { window.fbUpdateDoc(window.fbDoc(window.fbDb, "users", window.currentUser.uid), { isOnline: false }); } catch(e){}
        }
      });
    } catch(err) { console.warn("Firebase Init Offline Fallback Active:", err); window.isFirebaseReady = false; }
  </script>
  <script>
    const PATH_NAMES = { path_01: 'Default', path_02: 'Grass', path_03: 'Water', path_04: 'Abyss', path_05: 'Swamp', path_06: 'Winter', path_07: 'Trail', path_08: 'Clockwork', path_09: 'Blossom', path_10: 'Barren', path_11: 'Dungeon', path_12: 'Arcane', path_13: 'Palace', path_14: 'Void', path_15: 'Fungal', path_16: 'Ruins', path_17: 'Cyber' };
    const ITEM_METADATA = { antidead: { name: "Antidead", img: "items/antidead.png", max: 3 }, stalestill: { name: "Stalestill", img: "items/stalestill.png", max: 5 }, glidesteps: { name: "Glidesteps", img: "items/glidesteps.png", max: 10 } };
    const DISPLAY_CHARACTERS = ['bob', 'alice', 'dany', 'choco', 'greg', 'eva', 'fifi', 'ipul', 'jessy'];
    const ALL_PATHS = Array.from({length: 17}, (_, i) => `path_${(i+1).toString().padStart(2, '0')}`);
    const COIN_IMG = `<img src="characters/fifi/jejak.png" class="coin-icon" alt="coin" onerror="this.style.display='none'">`;
    const ANIM_FRAMES = [1, 2, 3, 2]; 

    let menuState = { p1Char: 'bob', pathTheme: 'path_01' };
    let rollerIdx = { path: 0, char: 0 };
    let authMode = 'login';
    let currentChallengeTarget = null;
    
    function loadLocalSave() {
      const saved = localStorage.getItem('tiletether_local_data');
      if (saved) { try { return JSON.parse(saved); } catch(e) {} }
      return { username: 'GUEST', coins: 1000, wins: 0, losses: 0, items: { antidead: 0, stalestill: 0, glidesteps: 0 } };
    }
    function saveLocalData() { if (window.userData) localStorage.setItem('tiletether_local_data', JSON.stringify(window.userData)); }
    
    window.userData = loadLocalSave();
    let totalCoins = window.userData.coins || 0;
    let itemsInventory = window.userData.items || { antidead: 0, stalestill: 0, glidesteps: 0 };

    const bgm = document.getElementById('bgmMenu');
    const sfxClick = document.getElementById('sfxClick');
    document.addEventListener('click', (e) => {
      if (e.target.closest('.btn, .menu-entry, .roller-card, .character-dock, .header-btn, .cell, #dpad')) {
        sfxClick.currentTime = 0; sfxClick.play().catch(()=>{});
        bgm.play().catch(()=>{});
      }
    });

    window.syncUserDataToLocal = function() {
      if (!window.userData) return;
      totalCoins = window.userData.coins || 0;
      itemsInventory = window.userData.items || { antidead: 0, stalestill: 0, glidesteps: 0 };
      if (window.userData.selectedChar) menuState.p1Char = window.userData.selectedChar;
      if (window.userData.selectedPath) menuState.pathTheme = window.userData.selectedPath;
      saveLocalData(); updateDashboard();
    };

    function updateDashboard() {
      const pathDisplayName = PATH_NAMES[menuState.pathTheme] || menuState.pathTheme;
      document.getElementById('dashPathText').innerText = pathDisplayName.toUpperCase();
      const mainImg = document.getElementById('mainCharImg');
      const dockName = document.getElementById('dockCharName');
      const dockAvatar = document.getElementById('dockAvatar');
      if (dockAvatar) dockAvatar.style.backgroundImage = `url('paths/${menuState.pathTheme}.png')`;
      if (mainImg) mainImg.src = `characters/${menuState.p1Char}/idle_1.png`;
      if (dockName && window.userData) dockName.innerText = (window.userData.username || 'GUEST').toUpperCase();
      document.documentElement.style.setProperty('--bg-img', `url('paths/${menuState.pathTheme}.png')`);
    }

    let currentIdleStep = 0;
    setInterval(() => {
      currentIdleStep = (currentIdleStep + 1) % ANIM_FRAMES.length;
      let frame = ANIM_FRAMES[currentIdleStep];
      let mainImg = document.getElementById('mainCharImg');
      if (mainImg && menuState.p1Char) mainImg.src = `characters/${menuState.p1Char}/idle_${frame}.png`;
      document.querySelectorAll('#charRollerStage .roller-card img').forEach(img => {
        let charName = img.dataset.char; if (charName) img.src = `characters/${charName}/idle_${frame}.png`;
      });
    }, 350);

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; updateDashboard(); }
    
    function openAuthModal(mode) {
      if (!window.isFirebaseReady) return showCustomAlert("OFFLINE", "Koneksi Firebase belum siap!");
      authMode = mode;
      document.getElementById('authForm').reset();
      document.getElementById('authTitle').innerText = mode === 'login' ? 'LOGIN AKUN' : 'DAFTAR AKUN BARU';
      document.getElementById('usernameGroup').style.display = mode === 'login' ? 'none' : 'flex';
      document.getElementById('ageGroup').style.display = mode === 'login' ? 'none' : 'flex';
      document.getElementById('authSubmitBtn').innerText = mode === 'login' ? 'MASUK' : 'DAFTAR SEKARANG';
      document.getElementById('toggleAuthModeBtn').innerText = mode === 'login' ? 'Belum punya akun? Daftar di sini' : 'Sudah punya akun? Login di sini';
      openModal('authModal');
    }
    function toggleAuthMode() { openAuthModal(authMode === 'login' ? 'register' : 'login'); }
    
    async function handleAuthSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('authEmail').value, password = document.getElementById('authPassword').value;
      const username = document.getElementById('authUsername').value, age = parseInt(document.getElementById('authAge').value);
      const btn = document.getElementById('authSubmitBtn');
      if (authMode === 'register') {
        if (!username || username.trim() === "") return showCustomAlert("ERROR", "Username wajib diisi!");
        if (isNaN(age) || age < 10 || age > 79) return showCustomAlert("ERROR", "Umur harus antara 10 hingga 79 tahun!");
      }
      const originalText = btn.innerText; btn.innerText = "MEMPROSES..."; btn.disabled = true;
      try {
        if (authMode === 'register') { await window.registerUserFB(email, password, username, age); showCustomAlert("BERHASIL", "Pendaftaran akun berhasil dan otomatis login!"); } 
        else { await window.loginUserFB(email, password); showCustomAlert("BERHASIL", "Login berhasil!"); }
        closeModal('authModal');
      } catch (err) { showCustomAlert("GAGAL", err.message); } 
      finally { btn.innerText = originalText; btn.disabled = false; }
    }

    function openProfileModal() {
      if(!window.userData) return;
      document.getElementById('profUsername').value = window.userData.username || '';
      document.getElementById('profEmail').value = window.userData.email || 'guest@offline';
      document.getElementById('profAge').value = window.userData.age || 10;
      document.getElementById('profCoins').innerText = window.userData.coins || 0;
      document.getElementById('profWins').innerText = window.userData.wins || 0;
      document.getElementById('profLosses').innerText = window.userData.losses || 0;
      let totItems = 0; if (window.userData.items) Object.values(window.userData.items).forEach(v => totItems += v);
      document.getElementById('profItems').innerText = totItems;
      openModal('profileModal');
    }
    
    async function saveProfileChanges() {
      const newUsername = document.getElementById('profUsername').value, newAge = parseInt(document.getElementById('profAge').value);
      if (!newUsername || newUsername.trim() === "") return showCustomAlert("ERROR", "Username tidak boleh kosong!");
      if (isNaN(newAge) || newAge < 10 || newAge > 79) return showCustomAlert("ERROR", "Umur harus 10-79 tahun!");
      window.userData.username = newUsername; window.userData.age = newAge;
      saveLocalData();
      if (window.saveUserDataToCloud) await window.saveUserDataToCloud();
      showCustomAlert("SUKSES", "Profil berhasil diperbarui!"); closeModal('profileModal'); updateDashboard();
    }
    
    async function logoutUser() {
      if(window.logoutUserFB) await window.logoutUserFB();
      window.userData = { username: 'GUEST', coins: 0, wins: 0, losses: 0, items: { antidead: 0, stalestill: 0, glidesteps: 0 } };
      closeModal('profileModal'); updateDashboard();
    }

    async function openPlayersModal() {
      if (!window.isFirebaseReady || !window.currentUser) return showCustomAlert("LOGIN DIPERLUKAN", "Silakan Login terlebih dahulu untuk bermain dan menantang pemain lain!", `<button class="btn btn-green btn-inline" onclick="closeModal('messageModal'); openAuthModal('login');">LOGIN</button><button class="btn btn-red btn-inline" onclick="closeModal('messageModal')">BATAL</button>`);
      openModal('playersModal');
      const container = document.getElementById('playersListContainer'); container.innerHTML = '<div style="text-align:center; color:#fff;">Memuat daftar pemain...</div>';
      const players = await window.loadAllPlayersCloud(); container.innerHTML = '';
      if (players.length === 0) return container.innerHTML = '<div style="text-align:center; color:#fff;">Belum ada pemain lain online.</div>';
      players.forEach(p => {
        const card = document.createElement('div'); card.className = 'player-card';
        const safeName = document.createElement('div'); safeName.innerText = p.username || 'PLAYER';
        card.innerHTML = `<div class="player-info"><div class="player-name">${safeName.innerHTML.toUpperCase()} <span class="status-badge ${p.isOnline ? 'status-online' : 'status-offline'}"></span></div><div class="player-stats">🪙 ${p.coins || 0} | 🏆 ${p.wins || 0}W ${p.losses || 0}L</div></div>${p.isOnline ? `<button class="btn btn-green shop-btn" onclick="openChallengeModal('${p.uid}', '${(p.username || '').replace(/'/g, "\\'")}', '${p.selectedChar || 'bob'}')">TANTANG</button>` : `<button class="btn shop-btn" disabled style="background:#555;">OFFLINE</button>`}`;
        container.appendChild(card);
      });
    }

    function openChallengeModal(uid, username, charName) {
      currentChallengeTarget = { uid, username, charName };
      document.getElementById('challengeTargetText').innerText = `Menantang: ${username.toUpperCase()}`;
      document.getElementById('challengeBetAmount').max = totalCoins;
      openModal('challengeModal');
    }
    
    async function sendChallenge() {
      const bet = parseInt(document.getElementById('challengeBetAmount').value);
      if (isNaN(bet) || bet < 100) return showCustomAlert("ERROR", "Minimal taruhan adalah 100 koin!");
      if (bet > totalCoins) return showCustomAlert("ERROR", "Koin kamu tidak mencukupi taruhan ini!");
      try {
        const mId = await window.createChallengeCloud(currentChallengeTarget.uid, currentChallengeTarget.username, currentChallengeTarget.charName, bet);
        closeModal('challengeModal'); closeModal('playersModal');
        showCustomAlert("MENUNGGU", "Tantangan telah dikirim! Menunggu konfirmasi dari lawan...");
        const unsub = window.listenOnlineMatchState(mId, (matchData) => {
          if (matchData.status === "active") {
            unsub(); closeModal('messageModal'); startOnlinePVPGame(mId, matchData, true);
          } else if (matchData.status === "rejected") {
            unsub(); showCustomAlert("DITOLAK", "Lawan menolak tantangan bermain.");
          }
        });
      } catch(err) { showCustomAlert("ERROR", err.message); }
    }
    
    async function respondChallenge(accept) {
      if (!window.activeChallengeDocId) return;
      closeModal('incomingChallengeModal');
      await window.respondChallengeCloud(window.activeChallengeDocId, accept);
      if (accept) startOnlinePVPGame(window.activeChallengeDocId, window.activeChallengeData, false);
    }

    function openPathModal() { rollerIdx.path = ALL_PATHS.indexOf(menuState.pathTheme); if (rollerIdx.path === -1) rollerIdx.path = 0; initRoller('path'); openModal('pathModal'); }
    function openCharModal() { rollerIdx.char = DISPLAY_CHARACTERS.indexOf(menuState.p1Char); if (rollerIdx.char === -1) rollerIdx.char = 0; initRoller('char'); openModal('charModal'); }
    function initRoller(type) {
      const isPath = type === 'path', list = isPath ? ALL_PATHS : DISPLAY_CHARACTERS;
      const stage = document.getElementById(isPath ? 'pathRollerStage' : 'charRollerStage');
      stage.innerHTML = '';
      list.forEach((item, idx) => {
        let card = document.createElement('div'); card.className = 'roller-card'; card.dataset.index = idx;
        let imgUrl = isPath ? `paths/${item}.png` : `characters/${item}/idle_1.png`;
        let displayName = isPath ? (PATH_NAMES[item] || item).toUpperCase() : item.replace('_',' ').toUpperCase();
        card.innerHTML = `<img src="${imgUrl}" data-char="${!isPath ? item : ''}" onerror="this.style.display='none'"><span class="item-name">${displayName}</span>`;
        card.onclick = () => { if (stage.wasDragging) return; let diff = getRollerDiff(idx, rollerIdx[type], list.length); if (diff !== 0) stepRoller(type, diff); else closeModal(isPath ? 'pathModal' : 'charModal'); };
        stage.appendChild(card);
      });
      updateRollerVisuals(type); setupRollerDrag(stage.id, type);
    }
    function stepRoller(type, step) { const list = type === 'path' ? ALL_PATHS : DISPLAY_CHARACTERS, len = list.length; rollerIdx[type] = (rollerIdx[type] + step + len) % len; updateRollerVisuals(type); }
    function getRollerDiff(targetIdx, currentIdx, len) { let diff = (targetIdx - currentIdx) % len; if (diff > Math.floor(len / 2)) diff -= len; if (diff < -Math.floor(len / 2)) diff += len; return diff; }
    function updateRollerVisuals(type) {
      const isPath = type === 'path', list = isPath ? ALL_PATHS : DISPLAY_CHARACTERS;
      const stage = document.getElementById(isPath ? 'pathRollerStage' : 'charRollerStage'), label = document.getElementById(isPath ? 'pathRollerLabel' : 'charRollerLabel');
      const currentIdx = rollerIdx[type], len = list.length, activeItem = list[currentIdx];
      label.innerText = isPath ? (PATH_NAMES[activeItem] || activeItem).toUpperCase() : activeItem.toUpperCase();
      if (isPath) menuState.pathTheme = activeItem; else menuState.p1Char = activeItem;
      saveLocalData(); if (window.saveUserDataToCloud) window.saveUserDataToCloud();
      Array.from(stage.children).forEach((card, idx) => {
        let diff = getRollerDiff(idx, currentIdx, len); card.style.filter = diff === 0 ? "brightness(1.1)" : "brightness(0.7)";
        if (diff === 0) { card.style.transform = "translate3d(0px, 0px, 40px) scale(1.15)"; card.style.opacity = "1"; card.style.zIndex = "10"; card.style.borderColor = "var(--gold)"; card.style.pointerEvents = "auto"; } 
        else if (Math.abs(diff) === 1) { card.style.transform = `translate3d(${diff * 95}px, 0px, -20px) scale(0.85)`; card.style.opacity = "0.7"; card.style.zIndex = "5"; card.style.borderColor = "#000"; card.style.pointerEvents = "auto"; } 
        else { card.style.transform = `translate3d(${diff > 0 ? 180 : -180}px, 0px, -100px) scale(0.5)`; card.style.opacity = "0"; card.style.zIndex = "1"; card.style.pointerEvents = "none"; }
      });
    }
    function setupRollerDrag(stageId, type) {
      const stage = document.getElementById(stageId); let startX = 0, isDragging = false; stage.wasDragging = false;
      stage.onpointerdown = (e) => { startX = e.clientX; isDragging = true; stage.wasDragging = false; stage.setPointerCapture(e.pointerId); };
      stage.onpointermove = (e) => { if (!isDragging) return; let deltaX = e.clientX - startX; if (Math.abs(deltaX) > 10) stage.wasDragging = true; if (Math.abs(deltaX) > 40) { stepRoller(type, deltaX > 0 ? -1 : 1); startX = e.clientX; } };
      const stopDrag = () => { isDragging = false; }; stage.onpointerup = stopDrag; stage.onpointercancel = stopDrag;
    }

    function showCustomAlert(title, text, customButtonsHTML = null) {
      document.getElementById('msgModalTitle').innerText = title; document.getElementById('msgModalText').innerText = text;
      document.getElementById('msgModalButtons').innerHTML = customButtonsHTML || `<button class="btn btn-blue btn-inline" onclick="closeModal('messageModal')">OK</button>`; openModal('messageModal');
    }

    function openShop() { document.getElementById('shopCoinDisplay').innerHTML = `${COIN_IMG} COINS: ${totalCoins}`; renderShop(); openModal('shopModal'); }
    function closeShop() { closeModal('shopModal'); }
    async function buyItem(id, price) {
      if (itemsInventory[id] >= ITEM_METADATA[id].max) return showCustomAlert("LIMIT", "Stok item penuh!");
      if (totalCoins < price) return showCustomAlert("GAGAL", "Koin Anda tidak mencukupi!");
      totalCoins -= price; itemsInventory[id]++; 
      window.userData.coins = totalCoins; window.userData.items = itemsInventory; saveLocalData();
      if (window.saveUserDataToCloud) await window.saveUserDataToCloud();
      document.getElementById('shopCoinDisplay').innerHTML = `${COIN_IMG} COINS: ${totalCoins}`; renderShop(); updateDashboard();
    }
    function renderShop() {
      const content = document.getElementById('shopContent'); content.innerHTML = '';
      let itemHTML = `<div class="shop-section"><div class="shop-section-title">Item Bantuan</div>`;
      const itemPrices = { antidead: 1000, stalestill: 800, glidesteps: 300 }, itemDescs = { antidead: "Untuk bangkit dari kematian", stalestill: "Untuk Diam di tempat", glidesteps: "Meluncur lurus jauh" };
      Object.keys(ITEM_METADATA).forEach(id => {
        let count = itemsInventory[id] || 0, meta = ITEM_METADATA[id], isFull = count >= meta.max;
        itemHTML += `<div class="shop-item-row"><div class="shop-item-info"><div class="shop-item-icon" style="background:#000;"><img src="${meta.img}" onerror="this.src='characters/bob/idle_1.png'"></div><div style="min-width:0;"><div style="font-weight:900; color:var(--gold); text-transform:uppercase; font-size:11px; text-shadow:1px 1px 0 #000;">${meta.name}</div><div style="font-size:9px; color:#ddd;">${itemDescs[id]}</div><div style="font-size:10px; color:#4caf50; font-weight:900; text-shadow:1px 1px 0 #000;">Stok: ${count}/${meta.max}</div></div></div>${isFull ? `<button class="btn shop-btn" disabled style="background:#555; border-color:#888;">PENUH</button>` : `<button class="btn btn-green shop-btn" onclick="buyItem('${id}', ${itemPrices[id]})">${COIN_IMG} ${itemPrices[id]}</button>`}</div>`;
      });
      content.innerHTML = itemHTML + `</div>`;
    }

    function launchCommunity() {
      const groupId = "1070738102191282", webUrl = "https://www.facebook.com/groups/" + groupId + "/";
      window.location.href = "fb://group/" + groupId; setTimeout(function() { window.open(webUrl, '_blank'); }, 1000);
    }

    function startSinglePlayerGame() {
      if (!window.currentUser && window.isFirebaseReady) return showCustomAlert("LOGIN DIPERLUKAN", "Silakan login terlebih dahulu untuk bermain.", `<button class="btn btn-green btn-inline" onclick="closeModal('messageModal'); openAuthModal('login');">LOGIN</button><button class="btn btn-red btn-inline" onclick="closeModal('messageModal')">BATAL</button>`);
      window.location.href = "gameplay.html?mode=offline";
    }

    function startOnlinePVPGame(matchId, matchData, isChallenger) {
      localStorage.setItem('tiletether_match_data', JSON.stringify(matchData));
      window.location.href = `gameplay.html?mode=online&matchId=${matchId}&isChallenger=${isChallenger}`;
    }

    updateDashboard();
  </script>
